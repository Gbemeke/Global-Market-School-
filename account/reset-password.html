<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Global Market School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy-deep:#0b1b33; --navy-mid:#12233f; --ivory:#f4efe0; --paper:#faf7ee;
  --gold:#b28e4c; --gold-bright:#d6b568; --hair:rgba(178,142,76,0.28);
  --ink:#1c2333; --ink-soft:#4a5468; --good:#3f7a5c; --bad:#8a3b2e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden; max-width:100%;}
body{
  font-family:'EB Garamond', Georgia, serif; background:var(--navy-deep); color:var(--ink);
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 16px;
}
a{color:inherit;}
.card{width:100%; max-width:420px; background:var(--paper); border:1px solid var(--gold); box-shadow:0 30px 80px -20px rgba(0,0,0,0.5);}
.card-head{padding:36px 32px 24px; text-align:center; border-bottom:1px solid var(--hair);}
.brand{display:flex; align-items:center; justify-content:center; gap:10px; font-family:'Cinzel', serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--navy-deep); text-decoration:none; margin-bottom:18px;}
.brand .mark{width:28px;height:28px;border-radius:50%; border:1.5px solid var(--gold); display:flex;align-items:center;justify-content:center; font-family:'Cormorant Garamond',serif; font-weight:600; font-size:14px; color:var(--gold);}
.card-head h1{font-family:'Cormorant Garamond', serif; font-weight:600; font-size:24px; color:var(--navy-deep);}
.card-body{padding:28px 32px 32px;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:12px; font-family:'Cinzel', serif; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); margin-bottom:7px;}
.field input{width:100%; padding:12px 14px; font-family:'EB Garamond', serif; font-size:16px; border:1px solid var(--hair); background:#fff; color:var(--ink);}
.field input:focus{outline:none; border-color:var(--gold);}
.submit-btn{width:100%; font-family:'Cinzel', serif; font-size:13px; letter-spacing:1.5px; text-transform:uppercase; background:var(--navy-deep); color:var(--ivory); border:1px solid var(--navy-deep); padding:15px; cursor:pointer;}
.submit-btn:hover{background:var(--gold); border-color:var(--gold); color:var(--navy-deep);}
.msg{font-size:14px; padding:12px 14px; margin-bottom:16px; border-left:3px solid; display:none;}
.msg.error{background:#fbf0ee; border-color:var(--bad); color:var(--bad); display:block;}
.msg.success{background:#eaf3ee; border-color:var(--good); color:var(--good); display:block;}
</style>
</head>
<body>

<div class="card">
  <div class="card-head">
    <a href="../index.html" class="brand"><span class="mark">G</span>Global Market School</a>
    <h1>Set a New Password</h1>
  </div>
  <div class="card-body">
    <p class="msg" id="msg"></p>
    <form id="reset-form">
      <div class="field">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" required autocomplete="new-password">
      </div>
      <button type="submit" class="submit-btn">Update Password</button>
    </form>
  </div>
</div>

<script>
  const supabaseClient = supabase.createClient(
    'https://ovrfpapbgeasgjlyyqwl.supabase.co',
    'sb_publishable_R8p44v0fCgbKKMv44xivqA_-n70nS2K'
  );

  document.getElementById('reset-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const newPassword = document.getElementById('new-password').value;
    const msg = document.getElementById('msg');

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

    if (error) {
      msg.className = 'msg error';
      msg.textContent = error.message;
    } else {
      msg.className = 'msg success';
      msg.textContent = 'Password updated. Redirecting to login...';
      setTimeout(function() { window.location.href = 'login.html'; }, 2000);
    }
  });
</script>

</body>
</html>
