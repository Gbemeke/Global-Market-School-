<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Global Market School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy-deep:#0b1b33; --navy-mid:#12233f; --ivory:#f4efe0; --paper:#faf7ee;
  --gold:#b28e4c; --gold-bright:#d6b568; --hair:rgba(178,142,76,0.28);
  --ink:#1c2333; --ink-soft:#4a5468; --good:#3f7a5c; --bad:#8a3b2e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden; max-width:100%;}
body{
  font-family:'EB Garamond', Georgia, serif; background:var(--navy-deep); color:var(--ink);
  min-height:100dvh; display:block; padding:60px 16px;
}
a{color:inherit;}
.card{
  width:100%; max-width:420px; margin:0 auto; background:var(--paper);
  border:1px solid var(--gold); box-shadow:0 30px 80px -20px rgba(0,0,0,0.5);
}
.card-head{padding:36px 32px 24px; text-align:center; border-bottom:1px solid var(--hair);}
.brand{display:flex; align-items:center; justify-content:center; gap:10px; font-family:'Cinzel', serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--navy-deep); text-decoration:none; margin-bottom:18px;}
.brand .mark{width:28px;height:28px;border-radius:50%; border:1.5px solid var(--gold); display:flex;align-items:center;justify-content:center; font-family:'Cormorant Garamond',serif; font-weight:600; font-size:14px; color:var(--gold);}
.card-head h1{font-family:'Cormorant Garamond', serif; font-weight:600; font-size:26px; color:var(--navy-deep);}
.card-head p{font-size:14px; color:var(--ink-soft); margin-top:6px;}
.card-body{padding:28px 32px 32px;}
.field{margin-bottom:16px;}
.field-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px;}
.field label{display:block; font-size:12px; font-family:'Cinzel', serif; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft);}
.forgot-link{font-size:13px; color:var(--gold); text-decoration:none; cursor:pointer;}
.field input{
  width:100%; padding:12px 14px; font-family:'EB Garamond', serif; font-size:16px;
  border:1px solid var(--hair); background:#fff; color:var(--ink);
}
.field input:focus{outline:none; border-color:var(--gold);}
.submit-btn{
  width:100%; font-family:'Cinzel', serif; font-size:13px; letter-spacing:1.5px; text-transform:uppercase;
  background:var(--navy-deep); color:var(--ivory); border:1px solid var(--navy-deep); padding:15px; cursor:pointer; margin-top:6px;
}
.submit-btn:hover{background:var(--gold); border-color:var(--gold); color:var(--navy-deep);}
.submit-btn:disabled{opacity:0.6; cursor:not-allowed;}
.switch-link{text-align:center; margin-top:20px; font-size:14.5px; color:var(--ink-soft);}
.switch-link a{color:var(--gold); text-decoration:none; font-weight:600;}
.msg{font-size:14px; padding:12px 14px; margin-bottom:16px; border-left:3px solid; display:none;}
.msg.error{background:#fbf0ee; border-color:var(--bad); color:var(--bad); display:block;}
.msg.success{background:#eaf3ee; border-color:var(--good); color:var(--good); display:block;}

.pw-wrap{position:relative;}
.pw-wrap input{padding-right:44px !important;}
.pw-toggle{
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; padding:4px;
  font-family:'Cinzel', serif; font-size:10px; letter-spacing:0.5px;
  color:var(--ink-soft); text-transform:uppercase;
}
.pw-toggle:hover{color:var(--gold);}
</style>
</head>
<body>

<div class="card">
  <div class="card-head">
    <a href="../index.html" class="brand"><span class="mark">G</span>Global Market School</a>
    <h1>Welcome Back</h1>
    <p>Sign in to your account</p>
  </div>
  <div class="card-body">

    <p class="msg" id="msg"></p>

    <form id="login-form">
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" required autocomplete="email">
      </div>

      <div class="field">
        <div class="field-top">
          <label for="password">Password</label>
          <span class="forgot-link" id="forgot-link">Forgot Password?</span>
        </div>
        <div class="pw-wrap"><input type="password" id="password" required autocomplete="current-password"><button type="button" class="pw-toggle" data-target="password">Show</button></div>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Log In</button>
    </form>

    <p class="switch-link">New here? <a href="register.html">Register Now</a></p>
  </div>
</div>

<script>
  const supabaseClient = supabase.createClient(
    'https://ovrfpapbgeasgjlyyqwl.supabase.co',
    'sb_publishable_R8p44v0fCgbKKMv44xivqA_-n70nS2K'
  );

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submit-btn');

    msg.className = 'msg';
    msg.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      msg.className = 'msg error';
      msg.textContent = error.message === 'Invalid login credentials'
        ? 'Incorrect email or password. Please try again.'
        : error.message;
      btn.disabled = false;
      btn.textContent = 'Log In';
      return;
    }

    window.location.href = 'dashboard.html';
  });

  document.getElementById('forgot-link').addEventListener('click', async function() {
    const email = document.getElementById('email').value.trim();
    const msg = document.getElementById('msg');

    if (!email) {
      msg.className = 'msg error';
      msg.textContent = 'Please enter your email address above first, then tap "Forgot Password?" again.';
      return;
    }

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://www.globalmarketschool.com/account/reset-password.html'
    });

    if (error) {
      msg.className = 'msg error';
      msg.textContent = error.message;
    } else {
      msg.className = 'msg success';
      msg.textContent = 'A password reset link has been sent to your email.';
    }
  });
</script>


<script>
  document.querySelectorAll('.pw-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const targetId = btn.getAttribute('data-target');
      const input = document.getElementById(targetId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    });
  });
</script>
</body>
</html>
